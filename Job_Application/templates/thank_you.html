<!DOCTYPE html>
<html>
<head>
<title>Application Submitted</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0ea5e9,#1e3a8a);
    height:100vh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:50px;
    border-radius:15px;
    width:420px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.checkmark{
    font-size:60px;
    color:#0ea5e9;
}

h1{
    margin-top:10px;
    color:#1e3a8a;
}

p{
    color:#555;
    margin-bottom:30px;
}

.buttons{
    display:flex;
    justify-content:space-between;
}

.btn{
    text-decoration:none;
    padding:12px 20px;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.dashboard{
    background:#0ea5e9;
    color:white;
}

.dashboard:hover{
    background:#0284c7;
}

.home{
    background:#1e3a8a;
    color:white;
}

.home:hover{
    background:#172554;
}

</style>
</head>

<body>

<div class="container">

<div class="checkmark">✔</div>

<h1>Application Submitted!</h1>

<p>
Thank you for applying.  
Your application has been received and will be reviewed.  
You will receive a response in a few days.
</p>

<div class="buttons">
<a class="btn dashboard" href="/dashboard">Go to Dashboard</a>
<a class="btn home" href="/">Go to Homepage</a>
</div>

</div>

</body>
</html>
