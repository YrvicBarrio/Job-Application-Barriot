<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted | Success</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0ea5e9, #1e3a8a);
            /* min-height is better than height:100vh for mobile browsers */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            /* Subtle entrance animation */
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .checkmark-wrapper {
            width: 80px;
            height: 80px;
            background: #f0f9ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .checkmark {
            font-size: 40px;
            color: #0ea5e9;
            line-height: 1;
        }

        h1 {
            font-size: 1.8rem;
            color: #1e3a8a;
            margin-bottom: 15px;
        }

        p {
            color: #64748b;
            margin-bottom: 35px;
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .buttons {
            display: flex;
            gap: 15px;
            flex-direction: column; /* Stacked on small screens */
        }

        /* Side-by-side buttons on tablets/desktops */
        @media (min-width: 400px) {
            .buttons {
                flex-direction: row;
                justify-content: center;
            }
        }

        .btn {
            flex: 1;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .btn-primary {
            background-color: #0ea5e9;
            color: white;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .btn-primary:hover {
            background-color: #0284c7;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: #f1f5f9;
            color: #1e3a8a;
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="checkmark-wrapper">
        <div class="checkmark">✔</div>
    </div>

    <h1>Success!</h1>

    <p>
        Your application has been received. 
        Our team will review your details and contact you within 3-5 business days.
    </p>

    <div class="buttons">
        <a class="btn btn-secondary" href="/">Logout</a>
        <a class="btn btn-primary" href="/dashboard">Back to Dashboard</a>
    </div>
</div>

</body>
</html>
