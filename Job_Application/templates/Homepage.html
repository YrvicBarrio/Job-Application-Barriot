<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
        }

        header {
            background-color: rgba(0, 0, 50, 0.8);
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
        }

        nav a {
            color: #00bfff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: white;
        }

        .hero {
            text-align: center;
            padding: 120px 20px;
        }

        .hero h2 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #cce7ff;
        }

        .btn {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s ease;
        }

        .login-btn {
            background-color: #7209b7;
            color: white;
        }

        .register-btn {
            background-color: #1e90ff;
            color: white;
        }

        .btn:hover {
            opacity: 0.85;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: rgba(0, 0, 50, 0.8);
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Website</h1>
        <nav>
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Welcome to Our Platform</h2>
        <p>Join us today or log in to access your account.</p>
        <a href="/login" class="btn login-btn">Login</a>
        <a href="/register" class="btn register-btn">Register</a>
    </section>

    <footer>
        &copy; 2026 My Website. All rights reserved.
    </footer>

</body>
</html>
