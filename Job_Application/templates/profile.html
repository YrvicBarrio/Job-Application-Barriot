<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings | Career Portal</title>
    <style>
        :root {
            --sidebar-bg: #1e293b;
            --main-bg: #f8fafc;
            --border-color: #e2e8f0;
            --accent-blue: #2563eb;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --error-red: #ef4444;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--main-bg); 
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR (EXACT MATCH) --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: fixed;
            height: 100vh;
        }

        .sidebar h1 {
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin-bottom: 40px;
            color: #38bdf8;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links { list-style: none; flex-grow: 1; }
        
        .nav-links a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 5px;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        /* This matches the Dashboard "active" button style */
        .nav-links a:hover, .nav-links a.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .sidebar-footer {
            border-top: 1px solid #334155;
            padding-top: 20px;
        }

        /* Red underline for Logout as requested */
        .logout-link {
            color: #f87171 !important;
            text-decoration: underline !important;
            text-underline-offset: 4px;
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 40px 60px;
        }

        .header-bar {
            margin-bottom: 40px;
        }

        .header-bar h2 { font-size: 1.75rem; color: var(--text-main); }
        .header-bar p { color: var(--text-muted); margin-top: 5px; }

        .settings-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            max-width: 600px;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: block;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; color: var(--text-main); }
        
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 1rem;
            background: var(--main-bg);
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }
        .success-message { background-color: #dcfce7; color: #166534; }
        .error-message { background-color: #fee2e2; color: #991b1b; }

        .btn-save {
            background-color: var(--accent-blue);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .btn-save:hover { background-color: #1d4ed8; }

        @media(max-width:900px) {
            .sidebar { width: 70px; padding: 20px 10px; }
            .sidebar h1, .nav-links span, .sidebar-footer span { display: none; }
            .main-content { margin-left: 70px; padding: 30px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h1><span>◈</span> Workspace</h1>
    
    <nav class="nav-links">
        <a href="/dashboard"><span>Dashboard</span></a>
        <a href="/profile" class="active"><span>Profile Settings</span></a>
    </nav>

    <div class="sidebar-footer">
        <a href="/logout" class="logout-link"><span>Logout</span></a>
    </div>
</div>

<div class="main-content">
    <div class="header-bar">
        <h2>Profile Settings</h2>
        <p>Manage your account details and security.</p>
    </div>

    {% if success %}
        <div class="alert success-message">Profile updated successfully!</div>
    {% endif %}
    
    {% if error %}
        <div class="alert error-message">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/profile" class="settings-card">
        <span class="section-title">Personal Details</span>
        
        <div class="form-group">
            <label for="new_username">Username</label>
            <input type="text" name="new_username" id="new_username" value="{{ session.get('user', '') }}">
        </div>

        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" name="name" id="name" value="{{ info.name if info else '' }}">
        </div>

        <div style="display: flex; gap: 20px;">
            <div class="form-group" style="flex: 1;">
                <label for="age">Age</label>
                <input type="number" name="age" id="age" value="{{ info.age if info else '' }}">
            </div>
            <div class="form-group" style="flex: 2;">
                <label for="address">Address</label>
                <input type="text" name="address" id="address" value="{{ info.address if info else '' }}">
            </div>
        </div>

        <span class="section-title" style="margin-top: 20px;">Identity Check</span>
        <div class="form-group">
            <label for="old_password">Current Password <span style="color:var(--error-red)">*</span></label>
            <input type="password" name="old_password" id="old_password" placeholder="Required to save changes">
        </div>
        
        <div class="form-group">
            <label for="new_password">New Password (Optional)</label>
            <input type="password" name="new_password" id="new_password" placeholder="Leave blank to keep current">
        </div>

        <button type="submit" class="btn-save">Save Changes</button>
    </form>
</div>

</body>
</html>
